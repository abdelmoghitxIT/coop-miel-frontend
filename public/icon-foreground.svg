<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a854"/>
      <stop offset="100%" stop-color="#c49a3c"/>
    </linearGradient>
  </defs>
  <!-- Honeycomb hexagon -->
  <polygon points="54,8 93,30 93,78 54,100 15,78 15,30" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
  <!-- Inner hexagon -->
  <polygon points="54,22 86,40 86,68 54,86 22,68 22,40" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <!-- Bee body -->
  <ellipse cx="54" cy="52" rx="12" ry="8" fill="url(#gold)"/>
  <!-- Bee stripes -->
  <rect x="48" y="46" width="3" height="13" rx="1.5" fill="#0a0a0a"/>
  <rect x="53" y="46" width="3" height="13" rx="1.5" fill="#0a0a0a"/>
  <rect x="58" y="46" width="3" height="13" rx="1.5" fill="#0a0a0a"/>
  <!-- Wings -->
  <ellipse cx="46" cy="42" rx="5" ry="3" fill="url(#gold)" opacity="0.6"/>
  <ellipse cx="62" cy="42" rx="5" ry="3" fill="url(#gold)" opacity="0.6"/>
  <!-- Head -->
  <circle cx="54" cy="42" r="4" fill="#0a0a0a"/>
  <!-- Eyes -->
  <circle cx="52.5" cy="41" r="1" fill="url(#gold)"/>
  <circle cx="55.5" cy="41" r="1" fill="url(#gold)"/>
</svg>
